x-env: &env
  env_file:
    - ${ENV_FILE:-.env}

services:
  postgres:
    <<: [*env]
    image: postgres:18.1-alpine
    container_name: fixmykit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fixmykit}
      POSTGRES_USER: ${POSTGRES_USER:-fixmykit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fixmykit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fixmykit} -d ${POSTGRES_DB:-fixmykit}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    <<: [*env]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fixmykit-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "if [ -f alembic.ini ]; then alembic upgrade head; fi &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  postgres_data:
