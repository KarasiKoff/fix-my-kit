# Черновик для nginx на хосте.
# Скопируйте в sites-available и подставьте домены и порты,
# которые совпадают с docker-compose.prod.yml (по умолчанию 127.0.0.1:8080 и :8001).
#
#   sudo ln -s /etc/nginx/sites-available/fix-my-kit /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ниже — HTTP :80 - удобно проверить до получения сертификатов. Для HTTPS смотрите закомментированный блок внизу.

server {
    listen 80;
    server_name app.fixmykit.example.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.fixmykit.example.com;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

