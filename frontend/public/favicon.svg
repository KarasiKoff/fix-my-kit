<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="wg" x1="5" y1="5" x2="27" y2="27" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b4c4ff"/>
      <stop offset="1" stop-color="#7b96ff"/>
    </linearGradient>
    <radialGradient id="bgg" cx="42%" cy="42%" r="60%" gradientUnits="objectBoundingBox">
      <stop stop-color="#181f38"/>
      <stop offset="1" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: dark card with subtle blue glow center -->
  <rect width="32" height="32" rx="7.5" fill="url(#bgg)"/>
  <!-- Border: accent-tinted subtle stroke -->
  <rect width="31" height="31" x=".5" y=".5" rx="7" stroke="#2a3560" stroke-width="1"/>

  <!-- Wrench icon: Lucide wrench (24×24) translated +4,+4 so it sits centered -->
  <g transform="translate(4,4)" filter="url(#glow)">
    <path
      d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
      stroke="url(#wg)"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
